services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel_app

    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - ./src:/var/www/html

    expose:
      - "9000"

    environment:
      APP_ENV: local
      APP_DEBUG: true

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

    tty: true

    networks:
      - laravel

  nginx:
    image: nginx:alpine

    container_name: laravel_nginx

    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel_vite

    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - ./src:/var/www/html

    command: npm run dev -- --host

    ports:
      - "5173:5173"

    depends_on:
      - app

    tty: true

    networks:
      - laravel

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel_queue

    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - ./src:/var/www/html

    command: php artisan queue:work --tries=3

    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel_scheduler

    restart: unless-stopped

    working_dir: /var/www/html

    volumes:
      - ./src:/var/www/html

    command: php artisan schedule:work

    depends_on:
      - app

    networks:
      - laravel

  mysql:
    image: mysql:8.4

    container_name: laravel_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: laravel_phpmyadmin

    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - laravel

  redis:
    image: redis:7-alpine

    container_name: laravel_redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - laravel

  mailpit:
    image: axllent/mailpit:latest

    container_name: laravel_mailpit

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
