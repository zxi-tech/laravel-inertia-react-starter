[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm
priority=1
autostart=true
autorestart=true

[program:queue]
directory=/var/www/html
command=php artisan queue:work --sleep=3 --tries=3 --timeout=90
user=root
priority=2
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:scheduler]
directory=/var/www/html
command=sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
user=root
priority=3
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr